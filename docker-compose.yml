# Generated by setupmc.com on 2026-05-02T07:58:42.996Z

services:
  mariadb:
    image: mariadb
    ports:
      - "3306:3306"
    env_file:
      - ./config/mariadb.env
    volumes:
      #- "./sql/init:/docker-entrypoint-initdb.d/"
      - "mariadb-data:/var/lib/mysql"

 ############################################# LIMBO ###

  mc-limbo:
    image: itzg/minecraft-server:latest
    container_name: limbo
    tty: true
    stdin_open: true
    ports:
      - "30060:30000"
    environment:
      ## Don't Change
      EULA: "TRUE"
      COPY_PLUGINS_SRC: /plugins-local
      ## Velocity
      ONLINE_MODE: "false"
      VELOCITY_MODERN: "true"
      BUNGEECORD: "false"
      FORWARDING_SECRETS_FILE: /run/secrets/forwarding_secrets
      ## RCON
      ENABLE_RCON: "true"
      RCON_PASSWORD_FILE: /run/secrets/rcon_pass
      ## SETTINGS
      TYPE: "LIMBO"
      LIMBO_SCHEMA_FILENAME: "RoomWithAMoost.schem"
      MEMORY: "512M"
      MAX_PLAYERS: "64"
    volumes:
      - "./servers/limbo:/data"
      - "./plugins/limbo:/plugins-local:ro"
    secrets:
      - rcon_pass
      - forwarding_secrets

  ############################################# MAIN ###

  mc-main:
    image: itzg/minecraft-server:latest
    container_name: main
    tty: true
    stdin_open: true
    ports:
      - "30070:25565"
    env_file:
      - ./config/global_env.env
    environment:
      MEMORY: "6G"
      LEVEL: "main"
      SERVER: "main"
      WORLD_NAME: "main"
      DIFFICULTY: "2"
      LEVEL_TYPE: "large_biomes"
      SEED: "-1172713370011937745"
      MODRINTH_PROJECTS: |
        decentholograms
        luckperms
        multiverse-core
        placeholderapi
        voidgen
        worldguard
        worldedit
    volumes:
      - "./servers/main:/data"
      - "./plugins/common:/plugins-common:ro"
      - "./plugins/main:/plugins-local:ro"
      - "./schematics:/data/plugins/WorldEdit/schematics:z"
    secrets:
      - rcon_pass
      - forwarding_secrets
volumes:
  mariadb-data:
secrets:
  rcon_pass:
    file: ./secrets/rcon_pass
  forwarding_secrets:
    file: ./secrets/forwarding_secrets
  paper_global_proxy_secret:
    file: ./secrets/forwarding_secrets