advancements:
  disable-saving: true
  disabled:
    - minecraft:story/disabled
commands:
  log: true
  replace-commands:
    - setblock
    - summon
    - tellraw
    - testforblock
  send-namespaced: true
  silent-commandblock-console: false
  spam-exclusions:
    - /skill
  tab-complete: 0
  enable-spam-exclusions: false
config-version: 12
messages:
  outdated-client: §cYour client is outdated! Please update to version {0}.
  outdated-server:
    §cThe server is running an older version ({0}). Stay tuned for
    updates.
  restart: §eSERVER is restarting. Please reconnect shortly!
  server-full: §cThe server is currently full. Try again later or contact an admin.
  unknown-command: §cUnknown command. Use "/help" to see available commands.
  whitelist: §cYou are not whitelisted on this server.
players:
  disable-saving: false
settings:
  attribute:
    attackDamage:
      max: 2048
    maxAbsorption:
      max: 2048
    maxHealth:
      max: 2048
    movementSpeed:
      max: 2048
  bungeecord: false
  debug: false
  log-named-deaths: true
  log-villager-deaths: true
  moved-too-quickly-multiplier: 99999999999
  moved-wrongly-threshold: 1.0625
  netty-threads: 4
  player-shuffle: 0
  restart-on-crash: true
  restart-script: ./start.sh
  sample-count: 12
  save-user-cache-on-stop-only: true
  timeout-time: 60
  user-cache-size: 999999
stats:
  disable-saving: false
  forced-stats: {}
